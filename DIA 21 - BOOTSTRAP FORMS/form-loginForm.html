<!DOCTYPE html>
<html lang="en">

<head>
    <title></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container">
        <div class="row">
            <form class="card my-5 px-5">
                <h3 class="my-5">Login</h3>
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input type="text" name="email" id="email" class="form-control">
                    <p class="form-text">Case Sensitive</p>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="pwd">Password</label>
                    <input type="password" name="pwd" id="pwd" class="form-control">
                </div>

                <div class="form-check form-check-switch my-3">
                    <input type="checkbox" name="pref" id="pref" class="form-check-input">
                    <label for="pref" class="form-check-label">Take me to Dashboard</label>
                </div>
                <button type="submit" class="btn btn-danger mt-4 login-button">Login</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous">
        </script>
</body>

</html>
