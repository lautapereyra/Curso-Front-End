<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="container bg-primary">
        <h1>Hello world container</h1>
    </div>
    <div class="container-fluid bg-primary">
        <h1>Hello world fluid</h1>
    </div>
    <div class="container-sm bg-primary"> <!-- >=576px device, fixed width of container 540px -->
        <h1>Hello world small</h1>
    </div>
    <div class="container-md bg-primary"> <!-- >=768px device, fixed width of container 720px -->
        <h1>Hello world medium</h1>
    </div>
    <div class="container-lg bg-primary"> <!-- >=992px device, fixed width of container 960px -->
        <h1>Hello world large</h1>
    </div>
    <div class="container-xl bg-primary"> <!-- >=1200px device, fixed width of container 1140px -->
        <h1>Hello world xl</h1>
    </div>
    <div class="container-xxl bg-primary"> <!-- >=1400px device, fixed width of container 1320px -->
        <h1>Hello world xxl</h1>
    </div>

    <script type="text/javascript" src="js/bootstrap.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"

</html>
