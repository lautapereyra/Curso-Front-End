<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <style>
        i,
        .icon-content {
            font-size: 2rem;
        }

        .icon-content {
            padding-left: 32px;
        }

        p:hover .myicon::before {
            color: red;
            transform: rotate(360deg)scale(1.3);

        }

        .myicon::before {
            transition: all 0.5s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="mt-05">
                <p><i class="bi-laptop myicon"></i><span class="icon-content">Laptop</span></p>
                <p><i class="bi-3-circle-fill myicon"></i> <span class="icon-content">3 circle fill</span></p>
                <p><i class="bi-x-diamond myicon"></i> <span class="icon-content">X - Diamond</span></p>
            </div>
        </div>
    </div>


    <script type="text/javascript" src="js/bootstrap.min.js">

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
