<!DOCTYPE html>
<html lang="en">

<head>
    <title></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style type="text/css">
        .header {
            background: #333;
        }

        .navbar-brand {
            font-size: 22px;
        }


        .navbar-brand,
        .nav-link {
            line-height: 72px;
            color: #fff;
        }

        .nav-link {
            margin-left: 30px;
        }

        .navbar-brand:hover,
        .navbar-brand:focus,
        .nav-link:hover,
        .navbar-nav .nav-link:active,
        .navbar-nav .nav-link:focus {
            color: #e74c3c;


        }

        .dropdown-menu {
            border-radius: 5px;
            background-color: #333;

        }

        .dropdown-item {
            color: #fff;
            background: transparent;

            text-align: center;
        }

        .dropdown-item:hover,
        .dropdown-item:active,
        .dropdown-item:focus {
            color: #e74c3c;
            background: transparent;
        }

        .navbar-toggler {
            border: 1px solid #727272dd;
            border-radius: 5px;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        .navbar-toggler-icon {
            background: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 1%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        @media screen and (max-width: 768px) {
            .nav-link {
                text-align: center;
                margin-left: 0;


            }
        }
    </style>
</head>

<body>
    <section class="header">
        <div class="container">
            <div class="row">
                <nav class="navbar navbar-expand-md">
                    <div class="container-fluid">

                        <a href="#" class="navbar-brand">My logo</a>

                        <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu"
                            aria-controls="menu" aria-expanded="false" aria-label="Toggle Navigation">

                            <span class="navbar-toggler-icon"></span>

                        </button>

                        <div class="collapse navbar-collapse" id="menu">
                            <ul class="navbar-nav ms-auto">
                                <li class="nav-item">
                                    <a href="#" class="nav-link active">Home</a>
                                </li>
                                <li class="nav-item">
                                    <a href="#" class="nav-link">About</a>
                                </li>
                                <li class="dropdown navbar-nav">
                                    <a href="#" class="nav-link dropdown-toggle " data-bs-toggle="dropdown"
                                        aria-expanded="false" role="button">Services</a>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item" href="#">Web Design</a></li>
                                        <li><a class="dropdown-item" href="#">Photo Manipulation</a></li>
                                        <li><a class="dropdown-item" href="#">Wordpress</a></li>
                                        <li><a class="dropdown-item" href="#">Graphic Design</a></li>
                                    </ul>
                                </li>
                                <li class="nav-item">
                                    <a href="#" class="nav-link">Contact</a>
                                </li>
                            </ul>
                        </div>

                    </div>
                </nav>
            </div>
        </div>
    </section>






    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>

</body>

</html>
