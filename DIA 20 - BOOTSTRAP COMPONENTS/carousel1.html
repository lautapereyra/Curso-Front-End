<!DOCTYPE html>
<html lang="en">

<head>
    <title></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .carousel {
            height: 100%;
            height: 100vh;
        }


        .carousel-inner {
            width: 100%;
            height: 100%;
        }

        .carousel-item {
            width: 100%;
            height: 100%;
        }

        h3 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <div id="mycarousel" class="carousel slide position-relative" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#mycarousel" data-bs-slide-to="0" aria-label="Slide1" class="active"
                aria-current="true"></button>
            <button type="button" data-bs-target="#mycarousel" data-bs-slide-to="1" aria-label="Slide2"></button>
            <button type="button" data-bs-target="#mycarousel" data-bs-slide-to="2" aria-label="Slide3"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="./img/imagen1.jpg">

                <div class="carousel-caption">
                    <h3>Hagamos este rompecabezas Guadita</h3>
                    <p>Es un bello paisaje para armar un buen rompecabezas</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="./img/imagen2.jpg">

                <div class="carousel-caption">
                    <h3>Hagamos este rompecabezas Guadita</h3>
                    <p>Es un bello paisaje para armar un buen rompecabezas</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="./img/imagen3.jpg">

                <div class="carousel-caption">
                    <h3>Hagamos este rompecabezas Guadita</h3>
                    <p>Es un bello paisaje para armar un buen rompecabezas</p>
                </div>
            </div>
        </div>

        <button type="button" data-bs-target="#mycarousel" class="carousel-control-prev" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden" aria-hidden="true">Previous</span>
        </button>
        <button type="button" data-bs-target="#mycarousel" class="carousel-control-next" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden" aria-hidden="true">Next</span>
        </button>
    </div>





    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>

</body>

</html>
