<!DOCTYPE html>
<html lang="en">

<head>
    <title></title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="accordion" id="myaccordion">


                <div class="accordion-item">
                    <h2 class="accordion-heading" id="heading1">
                        <button type="button" class="accordion-button" data-bs-toggle="collapse"
                            data-bs-target="#accordion-body1" aria-expanded="true" aria-controls="accordion-body1">
                            Item 1
                        </button>
                    </h2>
                    <div id="accordion-body1" class="collapse accordion-collapse show" data-bs-parent="myaccordion"
                        aria-labelledby="heading1">
                        <div class="accordion-body">
                            this is accordion 1
                        </div>
                    </div>
                </div>



                <div class="accordion-item">
                    <h2 class="accordion-heading" id="heading2">
                        <button type="button" class="accordion-button collapsed" data-bs-toggle="collapse"
                            data-bs-target="#accordion-body2" aria-expanded="false" aria-controls="accordion-body2">
                            Item 2
                        </button>
                    </h2>
                    <div id="accordion-body2" class="collapse accordion-collapse" data-bs-parent="myaccordion"
                        aria-labelledby="heading2">
                        <div class="accordion-body">
                            this is accordion 2
                        </div>
                    </div>
                </div>



                <div class="accordion-item">
                    <h2 class="accordion-heading" id="heading3">
                        <button type="button" class="accordion-button collapsed" data-bs-toggle="collapse"
                            data-bs-target="#accordion-body3" aria-expanded="false" aria-controls="accordion-body3">
                            Item 3
                        </button>
                    </h2>
                    <div id="accordion-body3" class="collapse accordion-collapse" data-bs-parent="myaccordion"
                        aria-labelledby="heading3">
                        <div class="accordion-body">
                            this is accordion 3
                        </div>
                    </div>
                </div>



            </div>
        </div>
    </div>









    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous">
        </script>
</body>

</html>
