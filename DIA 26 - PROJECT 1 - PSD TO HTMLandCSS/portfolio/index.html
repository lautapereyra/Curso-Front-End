<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Page Portfolio Template | Portfolio</title>

    <!-- css links -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/3d9936bb5e.js" crossorigin="anonymous"></script>

</head>

<body>
    <header>
        <div class="container">
            <div class="row">
                <nav class="navbar navbar-expand-lg navbar-dark full-width">
                    <a class="navbar-brand" href="#">Portfolio</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="menu">
                        <ul class="navbar-nav ms-auto ">
                            <li class="nav-item active"><a href="#" class="nav-link">Home</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">About</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">Services</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">Portfolio</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">Testimonials</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">Blog</a></li>
                            <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>

                        </ul>
                    </div>


                </nav>
            </div>
        </div>
    </header>

    <section class="main d-flex justify-content-center">
        <div class="main-content align-self-center">
            <div class="welcome">Welcome</div>
            <div class="type">I am <span class="mytext"></span></div>
            <div class="social-icons">
                <a href="#"><i class="fa fa-facebook"></i></a>
                <a href="#"><i class="fa fa-twitter"></i></a>
                <a href="#"><i class="fa fa-google-plus"></i></a>
                <a href="#"><i class="fa fa-behance"></i></a>
            </div>
            <a class="cta cta-portfolio" href="#">Portfolio</a>
            <a class="cta cta-contact" href="#">Contact</a>

        </div>

        <svg viewBox="0 0 1400 100" class="svg-bottom">
            <polygon points="0,0 200,100, 1200,100 1400,1 1400,100 0,100 0,0" style="fill:white"></polygon>
        </svg>

        <!-- particles.js container -->
        <div id="particles-js"></div> <!-- stats - count particles -->
        <div class="count-particles"> <span class="js-count-particles"></span></div>
        <!-- particles.js lib - https://github.com/VincentGarreau/particles.js -->
        <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script> <!-- stats.js lib -->
        <script src="http://threejs.org/examples/js/libs/stats.min.js"></script>
    </section>


    <!-- js links -->
    <script type="text/javascript" src="./js/jquery.min.js"></script>
    <script type="text/javascript" src="./js/bootstrap.min.js"></script>
    <script type="text/javascript" src="./js/respond.min.js"></script>
    <script type="text/javascript" src="./js/particles.js"></script>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script type="text/javascript" src="./js/main.js"></script>

</body>

</html>
